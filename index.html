<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Generator</title>
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<header class="top-bar">
  <div class="logo">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    <span>Prompt Generator</span>
  </div>
  <div class="api-key-wrap">
    <input type="password" id="apiKey" placeholder="OpenRouter API Key" />
  </div>
</header>

<main class="main">
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="chat">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      对话 AI
    </button>
    <button class="mode-tab" data-mode="image">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      图像生成
    </button>
    <button class="mode-tab" data-mode="code">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      代码生成
    </button>
  </div>

  <div class="card">
    <div class="panels">
      <div class="panel panel-input">
        <label class="panel-label" id="inputLabel">描述你想要的对话 AI 场景</label>
        <textarea id="userInput" placeholder="例如：一个能帮用户做旅行规划的助手，要求专业且友好"></textarea>
        <div class="panel-footer">
          <span class="char-count" id="charCount">0</span>
          <button class="btn-generate" data-mode="chat" id="generateBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            生成
          </button>
        </div>
      </div>

      <div class="divider"></div>

      <div class="panel panel-output">
        <div class="panel-label-row">
          <label class="panel-label">生成结果</label>
          <button class="btn-copy" id="copyBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            复制
          </button>
        </div>
        <div class="output-box" id="outputBox">
          <span class="placeholder-text" id="outputPlaceholder">结果将在这里显示...</span>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="output-section" id="outputSection"></div>

<div class="toast" id="toast"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
